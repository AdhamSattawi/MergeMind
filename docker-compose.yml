version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/app
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  mongodb_data:
