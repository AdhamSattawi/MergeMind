version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  elastic-mcp:
    image: docker.elastic.co/mcp/elasticsearch
    ports:
      - "8080:8080"
    environment:
      - ES_URL=${ELASTIC_ID}
      - ES_API_KEY=${ELASTIC_API_KEY}
    command: ["http"]
    depends_on:
      - mongodb

volumes:
  mongodb_data:
